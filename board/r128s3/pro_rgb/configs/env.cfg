#common
upgrade_available=0
bootlimit=5
bootcount=0

#for boot0 (nor)
rtosAB_next=A
rtosAB_now=A
loadpackage=bootpkg
loadpackage_rule=1
loadparts=arm-hpsram@:rv-hpsram@:dsp-hpsram@:config@:
normal_loadparts=config@0xc000000:arm-hpsram@:rv-hpsram@:dsp-hpsram@
etf_loadparts=arm-etf-hpsram@

keybox_list=
#for uboot (nand)
# systemAB_next=A
# systemAB_now=A
bootdelay=0
boot_partition=arm-sram
rv_partition=rv-sram
config_partition=config
# root_partition=notused
# systemA=rtosA
# systemB=rtosB
# rootfsA=notused
# rootfsB=notused
#load_rv=sunxi_flash read c200000 ${rv_partition}
#load_config=sunxi_flash read c000000 ${config_partition}
#load_arm=sunxi_flash read 4000000 ${boot_partition}
#boot_normal=sunxi_flash read 4000000 ${boot_partition};boot_rtos 4000080 4000080
#boot_normal=sunxi_flash read c004000 ${boot_partition};sunxi_flash read cb00000 ${config_partition};sunxi_flash read c200080 ${rv_partition};boot_rtos c004080 c004080
boot_normal=boot_rtos
boot_etf=setenv loadparts ${etf_loadparts};boot_rtos
bootcmd=run boot_normal

###############   for OTA RECOVERY  #############
# loadpartA=arm-lpsram@:rv-lpsram@:dsp-hpsram@:config@0x8000000
# loadpartB=arm-r@:config@0xc000000:
# ota_type=rtosREC
###############   for OTA AB  #############
loadpartA=arm-hpsram@:rv-hpsram@:dsp-hpsram@:config@:
loadpartB=arm-b@:rv-b@:dsp-b@:config-b@:
ota_type=rtosAB
