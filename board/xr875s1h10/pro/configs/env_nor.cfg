#common
upgrade_available=0
bootlimit=5
bootcount=0

#for boot0 (nor)
rtosAB_next=A
rtosAB_now=A
loadpackage=bootpkg
loadpackage_rule=1
xip_partition=rtos-xip
#if need to load elf, set load_way=elf
load_way=bin
loadparts=arm-hpsram@:arm-sram@:dsp-hpsram@:rv-hpsram@:config@0xc000000:

###############   for OTA RECOVERY  #############
loadpartA=arm-hpsram@:arm-sram@:dsp-hpsram@:rv-hpsram@:config@0xc000000:
loadpartB=arm-r@:config@0xc000000:
ota_type=rtosREC
